name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Parent module: pure Go, no system dependencies.
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26.2']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race -count=1 ./...

  # The lint job runs golangci-lint v1.64.8 against the parent module
  # plus each submodule below.
  #
  # install-mode: goinstall (set on every golangci-lint-action@v6 step)
  # builds the v1.64.8 binary from source under the active Go toolchain
  # — Go 1.26.2 from the setup-go step above — rather than downloading
  # the pre-built binary, which is published built with Go 1.23.
  # v1.64.8 binaries hard-refuse to lint a Go 1.26.2 codebase with:
  #
  #   "the Go language version (go1.23) used to build golangci-lint is
  #    lower than the targeted Go version (1.26.2)"
  #
  # goinstall sidesteps that by rebuilding under the active toolchain.
  # It's slightly slower than the binary download path (single-digit
  # extra seconds per step, dominated by the lint run itself) but is
  # the only working option until the pin bumps to a v2.x release that
  # was published built against Go 1.26+. Bump deliberately when ready
  # — v2.x changed the config schema, so a pin bump should land
  # alongside any .golangci.yml that depends on the new shape.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          args: --timeout=5m

  # CGo submodules. transport/pcsc wraps github.com/ebfe/scard which
  # links against pcsclite/winscard, so the submodule (and anything
  # depending on it) needs libpcsclite-dev installed before `go test`
  # on Linux. macOS has PC/SC built into the OS (CryptoTokenKit /
  # winscard); no install needed.
  #
  # The OS matrix exists because PC/SC behavior and CGo paths differ
  # between Linux and macOS, and the CLI is meant to work on both.
  # Without macOS coverage, every Mac-side regression has to wait
  # for a developer to run it locally.
  #
  # transport/grpc and transport/grpc/example are split into their
  # own job below because their go directive is 1.24+ (forced by
  # google.golang.org/grpc >= 1.79.3, the first release that fixes
  # CVE-2026-33186). Keeping them in the same matrix here would
  # mean either dropping Go 1.22 coverage from the rest of the
  # repo or testing the grpc submodules under a Go version they
  # can't actually build with.
  submodules:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.26.2']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install pcsclite headers (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev

      - name: transport/pcsc — verify, vet, test
        working-directory: transport/pcsc
        run: |
          go mod verify
          go vet ./...
          go test -v -race -count=1 ./...

      - name: transport/pcsc/example — verify, vet, build
        working-directory: transport/pcsc/example
        run: |
          go mod verify
          go vet ./...
          go build -o /tmp/scp-pcsc-demo .

      - name: cmd/scpctl — verify, vet, test, build
        working-directory: cmd/scpctl
        run: |
          go mod verify
          go vet ./...
          go test -v -race -count=1 ./...
          go build -o /tmp/scpctl .

  # transport/grpc + transport/grpc/example — separate from the
  # main submodules job because they require a system dependency
  # that the parent module doesn't (libpcsclite-dev for the example
  # server which imports transport/pcsc via CGo). The Go toolchain
  # version is unified at 1.26.2 across all jobs after the
  # repo-wide go.mod bump; the historical grpc-1.24-floor (set by
  # google.golang.org/grpc >= 1.79.3 + CVE-2026-33186 fix) is below
  # 1.26.2 so no longer constrains the matrix.
  grpc-submodules:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.26.2']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install pcsclite headers (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev

      - name: transport/grpc — verify, vet, test
        working-directory: transport/grpc
        run: |
          go mod verify
          go vet ./...
          go test -v -race -count=1 ./...

      - name: transport/grpc/example — verify, vet, build
        working-directory: transport/grpc/example
        run: |
          go mod verify
          go vet ./...
          go build -o /tmp/cardrelay-server ./server
          go build -o /tmp/cardrelay-client ./client

  # Lint for the CGo submodules. Shares the apt install with the
  # test job above but kept separate so a lint failure doesn't
  # mask a test failure or vice versa.
  submodules-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Install pcsclite headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev

      - name: golangci-lint transport/pcsc
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          working-directory: transport/pcsc
          args: --timeout=5m

      - name: golangci-lint transport/pcsc/example
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          working-directory: transport/pcsc/example
          args: --timeout=5m

      - name: golangci-lint cmd/scpctl
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          working-directory: cmd/scpctl
          args: --timeout=5m

  # Lint for the grpc submodules — separate from submodules-lint
  # because the example server requires libpcsclite-dev (CGo
  # import of transport/pcsc). Go toolchain 1.26.2 is repo-wide
  # after the unified version bump.
  grpc-submodules-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Install pcsclite headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev

      - name: golangci-lint transport/grpc
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          working-directory: transport/grpc
          args: --timeout=5m

      - name: golangci-lint transport/grpc/example
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          working-directory: transport/grpc/example
          args: --timeout=5m

  # govulncheck scans imports for known vulnerabilities. Pinned tool
  # version so a vendor advisory landing during a release window
  # doesn't fail CI on an unrelated PR; bump deliberately.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Install pcsclite headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck (root module)
        run: govulncheck ./...

      - name: Run govulncheck (transport/pcsc)
        working-directory: transport/pcsc
        run: govulncheck ./...

      - name: Run govulncheck (cmd/scpctl)
        working-directory: cmd/scpctl
        run: govulncheck ./...

      - name: Run govulncheck (transport/grpc)
        working-directory: transport/grpc
        run: govulncheck ./...
