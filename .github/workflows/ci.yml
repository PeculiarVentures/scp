name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Parent module: pure Go, no system dependencies.
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # CGo submodules. transport/pcsc wraps github.com/ebfe/scard which
  # links against pcsclite/winscard, so the submodule (and anything
  # depending on it) needs libpcsclite-dev installed before `go test`
  # on Linux. macOS has PC/SC built into the OS (CryptoTokenKit /
  # winscard); no install needed.
  #
  # The OS matrix exists because PC/SC behavior and CGo paths differ
  # between Linux and macOS, and the CLI is meant to work on both.
  # Without macOS coverage, every Mac-side regression has to wait
  # for a developer to run it locally.
  #
  # transport/grpc and transport/grpc/example are split into their
  # own job below because their go directive is 1.24+ (forced by
  # google.golang.org/grpc >= 1.79.3, the first release that fixes
  # CVE-2026-33186). Keeping them in the same matrix here would
  # mean either dropping Go 1.22 coverage from the rest of the
  # repo or testing the grpc submodules under a Go version they
  # can't actually build with.
  submodules:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install pcsclite headers (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev

      - name: transport/pcsc — verify, vet, test
        working-directory: transport/pcsc
        run: |
          go mod verify
          go vet ./...
          go test -v -race -count=1 ./...

      - name: transport/pcsc/example — verify, vet, build
        working-directory: transport/pcsc/example
        run: |
          go mod verify
          go vet ./...
          go build -o /tmp/scp-pcsc-demo .

      - name: cmd/scpctl — verify, vet, test, build
        working-directory: cmd/scpctl
        run: |
          go mod verify
          go vet ./...
          go test -v -race -count=1 ./...
          go build -o /tmp/scpctl .

  # transport/grpc + transport/grpc/example — separate from the
  # main submodules job because they require Go 1.24+ (forced by
  # google.golang.org/grpc >= 1.79.3, which is the first release
  # that includes the CVE-2026-33186 authorization-bypass fix).
  #
  # transport/grpc/example/server imports transport/pcsc (CGo) so
  # this job needs libpcsclite-dev on Linux just like the
  # submodules job. macOS has PC/SC built into the OS, no install
  # needed.
  grpc-submodules:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.24', '1.25']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install pcsclite headers (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev

      - name: transport/grpc — verify, vet, test
        working-directory: transport/grpc
        run: |
          go mod verify
          go vet ./...
          go test -v -race -count=1 ./...

      - name: transport/grpc/example — verify, vet, build
        working-directory: transport/grpc/example
        run: |
          go mod verify
          go vet ./...
          go build -o /tmp/cardrelay-server ./server
          go build -o /tmp/cardrelay-client ./client

  # Lint for the CGo submodules. Shares the apt install with the
  # test job above but kept separate so a lint failure doesn't
  # mask a test failure or vice versa.
  submodules-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install pcsclite headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev

      - name: golangci-lint transport/pcsc
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: transport/pcsc
          args: --timeout=5m

      - name: golangci-lint transport/pcsc/example
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: transport/pcsc/example
          args: --timeout=5m

      - name: golangci-lint cmd/scpctl
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: cmd/scpctl
          args: --timeout=5m

  # Lint for the grpc submodules — separate from submodules-lint
  # because they require Go 1.24+. transport/grpc/example/server
  # imports transport/pcsc (CGo) so libpcsclite-dev is required.
  grpc-submodules-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install pcsclite headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev

      - name: golangci-lint transport/grpc
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: transport/grpc
          args: --timeout=5m

      - name: golangci-lint transport/grpc/example
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: transport/grpc/example
          args: --timeout=5m
